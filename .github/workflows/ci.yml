name: CI

on:
  push:
    branches: [main, "feature/**", "bacpipe-2.0"]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pyflakes

      - name: Compile-check all Python sources
        run: python -m compileall -q src/

      - name: flake8 (errors only)
        run: |
          # Stop the build on real errors; ignore stylistic warnings for now.
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Install only Python-level deps; bioinformatics tools are tested in the integration job.
          pip install pandas pyyaml aiofiles aiohttp requests pytest pytest-asyncio biopython

      - name: Run pytest (skip if no tests yet)
        run: |
          if [ -z "$(find tests -name 'test_*.py' -print -quit)" ]; then
            echo "No tests found yet — skipping pytest."
          else
            pytest -q tests/
          fi

  amrfinder-smoke:
    name: AMRFinderPlus smoke test
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    # Only run on main / release tags to save bioconda solve time on every PR.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge,bioconda
          channel-priority: strict

      - name: Install AMRFinderPlus
        shell: bash -l {0}
        run: |
          conda install -y -c bioconda ncbi-amrfinderplus
          amrfinder --version

      - name: Verify amrfinder CLI wrapper imports
        shell: bash -l {0}
        run: |
          pip install pandas
          PYTHONPATH=src python -c "from bacpipe.analysis import amrfinderplus; print('amrfinderplus module OK')"
